# SmartLearn AI - Nginx 主配置
# 路径: /etc/nginx/nginx.conf

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 工作进程可以打开的最大文件描述符数量
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── 日志格式 ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── 性能优化 ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── 缓存配置 ──
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── 代理缓存 ──
    proxy_cache_path /var/cache/nginx/proxy levels=1:2 keys_zone=proxy_cache:10m max_size=1g inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_valid 200 304 12h;
    proxy_cache_valid any 1m;

    # ── 限流配置 ──
    # 通用 API 限流: 10 请求/秒
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # AI 端点限流: 5 请求/秒 (更严格)
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=5r/s;
    # 连接数限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── 全局安全头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── 上游服务器配置 ──
    upstream api_backend {
        least_conn;
        server api:8000 weight=5 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ai_engine_backend {
        least_conn;
        server ai-engine:8001 weight=3 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream mobile_frontend {
        server mobile-web:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream admin_frontend {
        server admin:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream web_frontend {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream student_frontend {
        server student-web:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ── 包含站点配置 ──
    include /etc/nginx/conf.d/*.conf;
}