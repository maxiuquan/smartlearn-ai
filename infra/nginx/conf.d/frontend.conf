# 主站点（默认）
server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/default.access.log json;
    error_log /var/log/nginx/default.error.log;

    # 重定向到管理后台
    return 301 http://admin.smartlearn.local$request_uri;
}
