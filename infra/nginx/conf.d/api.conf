# SmartLearn AI - API代理配置

# API服务
server {
    listen 80;
    server_name api.smartlearn.local;

    # 访问日志
    access_log /var/log/nginx/api.access.log json;
    error_log /var/log/nginx/api.error.log;

    # 限流
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 10;

    # 代理设置
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # 连接设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 缓存控制
        proxy_cache proxy_cache;
        add_header X-Cache-Status $upstream_cache_status;

        # CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Api-Key, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # WebSocket支持
    location /ws {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # 健康检查
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }

    # API文档
    location /docs {
        proxy_pass http://api_backend/docs;
    }

    location /redoc {
        proxy_pass http://api_backend/redoc;
    }

    location /openapi.json {
        proxy_pass http://api_backend/openapi.json;
    }
}

# AI引擎服务
server {
    listen 80;
    server_name ai.smartlearn.local;

    access_log /var/log/nginx/ai.access.log json;
    error_log /var/log/nginx/ai.error.log;

    # AI服务限流更宽松
    limit_req zone=api_limit burst=50 nodelay;

    location / {
        proxy_pass http://ai_engine_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI服务需要更长的超时
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 流式响应支持
        proxy_buffering off;
        proxy_cache off;

        # CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials true always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /health {
        proxy_pass http://ai_engine_backend/health;
        access_log off;
    }
}
