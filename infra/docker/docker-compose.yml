version: '3.8'

services:
  # API服务
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: smartlearn-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-smartlearn_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err: POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-smartlearn}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err: REDIS_PASSWORD must be set}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - JWT_SECRET=${JWT_SECRET:?err: JWT_SECRET must be set}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    volumes:
      - ../../data:/app/data:ro
      - api-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartlearn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AI引擎服务
  ai-engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ai-engine
    container_name: smartlearn-ai-engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - CHAT_MODEL=${CHAT_MODEL:-gpt-4o-mini}
      - VECTOR_STORE_HOST=milvus
      - VECTOR_STORE_PORT=19530
    volumes:
      - ai-models:/app/models
      - ai-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - smartlearn-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 移动端Web
  mobile:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mobile
    container_name: smartlearn-mobile
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - API_BASE_URL=http://api:8000
      - AI_ENGINE_URL=http://ai-engine:8001
    depends_on:
      - api
      - ai-engine
    networks:
      - smartlearn-network

  # 管理后台
  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.admin
    container_name: smartlearn-admin
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    networks:
      - smartlearn-network

  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: smartlearn-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-smartlearn_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err: POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-smartlearn}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smartlearn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartlearn_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: smartlearn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?err: REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    networks:
      - smartlearn-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: smartlearn-milvus
    restart: unless-stopped
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - smartlearn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # etcd (Milvus依赖)
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: smartlearn-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - smartlearn-network

  # MinIO (Milvus依赖)
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: smartlearn-minio
    restart: unless-stopped
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?err: MINIO_ACCESS_KEY must be set}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?err: MINIO_SECRET_KEY must be set}
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data
    networks:
      - smartlearn-network

  # Celery Worker (异步任务)
  celery-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: smartlearn-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-smartlearn_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err: POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-smartlearn}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err: REDIS_PASSWORD must be set}
    volumes:
      - ../../data:/app/data:ro
    depends_on:
      - db
      - redis
    networks:
      - smartlearn-network

  # Celery Beat (定时任务调度)
  celery-beat:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: smartlearn-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err: REDIS_PASSWORD must be set}
    depends_on:
      - redis
    networks:
      - smartlearn-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: smartlearn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - mobile
      - admin
    networks:
      - smartlearn-network

networks:
  smartlearn-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  milvus-data:
  etcd-data:
  minio-data:
  api-logs:
  ai-models:
  ai-logs:
  nginx-logs:
