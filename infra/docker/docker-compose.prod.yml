version: '3.8'

# ============================================================
# SmartLearn AI - 生产环境覆盖配置
# ============================================================
# 使用方式:
#   docker compose -f docker-compose.yml -f infra/docker/docker-compose.prod.yml up -d
# ============================================================

services:
  # ── PostgreSQL 数据库 ──
  db:
    # 生产环境不暴露任何宿主机端口
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Redis 缓存 ──
  redis:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── etcd ──
  etcd:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO ──
  minio:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Milvus ──
  milvus:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── API 服务 ──
  api:
    restart: always
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ── AI 引擎服务 ──
  ai-engine:
    restart: always
    environment:
      - ENVIRONMENT=production
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 2G
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ── 移动端 Web ──
  mobile-web:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── 管理后台 ──
  admin:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Web 前端 (Next.js) ──
  web:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Celery Worker ──
  celery-worker:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ── Celery Beat ──
  celery-beat:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx 反向代理 ──
  nginx:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"