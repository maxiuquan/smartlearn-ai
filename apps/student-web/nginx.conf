# SmartLearn AI - 学生端 Web SPA fallback + 反向代理
# 由 apps/student-web/Dockerfile.student 以 default.conf 形式 COPY 进 nginx:alpine
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由兜底：深链接刷新返回 index.html（不再 404）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 前端静态资源（带 hash 文件名）可缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # 游戏/AI 接口：转发到 compose 中的 ai-engine 服务（容器名 ai-engine，端口 8001）。
    # 注意：proxy_pass 不带末尾斜杠，保留完整请求路径 /word-games/... 透传到后端。
    location /word-games/ {
        proxy_pass http://ai-engine:8001;
        proxy_http_version 1.1;
        # 由网关注入 service key，使经本反代的 /word-games 请求通过 ai-engine 全局鉴权（C1）。
        # 以下占位符在容器启动时由 /docker-entrypoint.d/40-inject-ai-key.sh 替换为真实密钥。
        proxy_set_header X-Api-Key "__AI_ENGINE_API_KEY__";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 通用 API 反向代理：转发到 compose 中的 api 服务（容器名 api，端口 8000）。
    # 注意：proxy_pass 不带末尾斜杠，保留完整请求路径 /api/... 透传到后端。
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
