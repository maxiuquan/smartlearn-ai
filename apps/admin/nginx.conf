# SmartLearn AI - 管理后台 SPA + API 反向代理
# 由 apps/admin/Dockerfile.admin 以 default.conf 形式 COPY 进 nginx:alpine
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由兜底：所有非资源请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 前端静态资源（带 hash 文件名）可缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # API 反向代理：转发到 compose 中的 api 服务（容器名 api，端口 8000）。
    # 注意：proxy_pass 不带末尾斜杠，保留完整请求路径 /api/v1/... 透传到后端。
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
