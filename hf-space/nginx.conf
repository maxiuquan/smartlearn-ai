# ──────────────────────────────────────────────────────────────
# SmartLearn AI - HF Spaces nginx 配置
# ──────────────────────────────────────────────────────────────
# 单端口 7860 同时服务:
#   /            → student-web 静态文件
#   /admin/      → admin 管理后台静态文件
#   /api/        → 反代到 api 后端 (127.0.0.1:8000)
#   /word-games/ → 反代到 ai-engine (127.0.0.1:8001,注入 X-Api-Key)
#   /chat/       → 反代到 ai-engine (127.0.0.1:8001,注入 X-Api-Key)
# ──────────────────────────────────────────────────────────────

# HF Spaces 以 UID 1000 用户运行,nginx worker 也用该用户
user user;

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # 非 root 运行时,temp 路径必须可写
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    access_log /tmp/nginx-access.log;
    error_log  /tmp/nginx-error.log warn;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 50m;

    server {
        listen 7860;
        server_name _;

        root /app/web;
        index index.html;

        # ── student-web SPA ──
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── admin 管理后台 SPA (子路径 /admin/) ──
        location /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }

        # ── 静态资源缓存 ──
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        # ── API 反代 → api 后端 ──
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── word-games 反代 → ai-engine (注入 X-Api-Key 通过服务间鉴权) ──
        # 占位符 __AI_ENGINE_API_KEY__ 由 entrypoint.sh 启动时替换为真实密钥
        location /word-games/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header X-Api-Key "__AI_ENGINE_API_KEY__";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── chat 对话反代 → ai-engine ──
        location /chat/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header X-Api-Key "__AI_ENGINE_API_KEY__";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── keepalive 保活端点 → api 后端 ──
        # Upstash Cron 定期 ping 此路径,同时保活 HF Space + Aiven PG + Upstash Redis
        location /keepalive {
            proxy_pass http://127.0.0.1:8000/keepalive;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        # ── health 健康检查 → api 后端 ──
        location /health {
            proxy_pass http://127.0.0.1:8000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }
    }
}
