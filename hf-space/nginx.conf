# ──────────────────────────────────────────────────────────────
# SmartLearn AI - HF Spaces nginx 配置
# ──────────────────────────────────────────────────────────────
# 单端口 7860 同时服务:
#   /            → student-web 静态文件
#   /admin/      → admin 管理后台静态文件
#   /api/        → 反代到 api 后端 (127.0.0.1:8000)
#   /word-games/ → 反代到 ai-engine (127.0.0.1:8001,注入 X-Api-Key)
#   /chat/       → 反代到 ai-engine (127.0.0.1:8001,注入 X-Api-Key)
# ──────────────────────────────────────────────────────────────

# HF Spaces 以 UID 1000 用户运行,nginx worker 也用该用户
user user;

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # 非 root 运行时,temp 路径必须可写
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    access_log /tmp/nginx-access.log;
    error_log  /tmp/nginx-error.log warn;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ── P1 安全加固: 请求体大小限制 ──
    # 默认 10m;上传路由(/api/v1/users/import)在各自 location 内单独放宽
    client_max_body_size 10m;

    # ── P1 安全加固: 连接超时 ──
    # 客户端请求体/请求头读取超时,防止慢速攻击(Slowloris)
    client_body_timeout   30s;
    client_header_timeout 30s;

    # ── P1 安全加固: 请求头大小限制 ──
    # 限制大请求头攻击,默认 4 8K = 32K 已足够(含 Cookie/JWT)
    large_client_header_buffers 4 8k;

    # ── P1 安全加固: 真实客户端 IP 解析 ──
    # 仅信任 HF 内部代理网段,防止客户端伪造 X-Forwarded-For
    # HF Spaces 内网代理通常在 10.0.0.0/8 私有网段
    set_real_ip_from 10.0.0.0/8;
    real_ip_recursive on;
    # real_ip_header 默认使用 X-Forwarded-For,配合 real_ip_recursive
    # 从右向左剥离可信代理 IP,取第一个非可信 IP 作为 $realip_remote_addr

    # ── P1 安全加固: 限流 zone 定义 ──
    # API/AI 通用限流: 10 req/s per IP,burst 20
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    # 认证路由限流(更严格): 5 req/s per IP,burst 10
    # 覆盖 /api/v1/auth/* (login/register/refresh 等),防止暴力撞库
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/s;
    # 限流时返回 429 而非默认的 503
    limit_req_status 429;

    server {
        listen 7860;
        server_name _;

        root /app/web;
        index index.html;

        # ── P1-4.1: 全局安全响应头 ──
        # HSTS: 强制 HTTPS，1 年有效期，含子域名
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP: 严格限制资源加载来源，禁止内联脚本/样式外其余危险源
        #   - default-src 'self': 默认只允许同源
        #   - script-src 'self': 禁止内联与第三方脚本（防 XSS 注入）
        #   - style-src 'self' 'unsafe-inline': 允许内联样式（Tailwind 等需要）
        #   - img-src 'self' data: https: : 允许 data URL 和 HTTPS 图片
        #   - connect-src 'self' https: 允许同源 + HTTPS API 调用
        #   - font-src 'self' data: 允许同源字体和 data URL
        #   - frame-ancestors 'none': 禁止任何站点嵌入（防点击劫持）
        #   - base-uri 'self': 禁止篡改 <base>
        #   - form-action 'self': 表单只能提交到同源
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # X-Frame-Options: DENY 防点击劫持（CSP frame-ancestors 的兜底）
        add_header X-Frame-Options "DENY" always;
        # X-Content-Type-Options: nosniff 防止 MIME 嗅探
        add_header X-Content-Type-Options "nosniff" always;
        # Referrer-Policy: 仅在同源请求中传递完整 Referrer，跨源只传 origin
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Permissions-Policy: 禁用不需要的浏览器能力
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

        # ── P1 安全加固: 屏蔽内部端点（仅允许本机访问）──
        # /metrics /docs /redoc /openapi.json 暴露运行时指标与接口结构,
        # 公网访问会泄露敏感信息;仅允许本机(127.0.0.1)访问(用于 HF 内部健康检查/调试)
        location = /metrics {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            proxy_pass http://127.0.0.1:8000/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        location = /docs {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            proxy_pass http://127.0.0.1:8000/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        location = /redoc {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            proxy_pass http://127.0.0.1:8000/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        location = /openapi.json {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            proxy_pass http://127.0.0.1:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        # ── student-web SPA ──
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── admin 管理后台 SPA (子路径 /admin/) ──
        location /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }

        # ── 静态资源缓存 ──
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        # ── P1 安全加固: 认证路由(更严格限流) → api 后端 ──
        # /api/v1/auth/* (login/register/refresh/logout/wechat 等)
        # 5 req/s per IP,burst 10,防止暴力撞库与注册轰炸
        location /api/v1/auth/ {
            limit_req zone=auth_strict burst=10 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_redirect http:// https://;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── P1 安全加固: AI 路由(SSE 长连接超时) → api 后端 ──
        # /api/v1/ai/* 流式响应(SSE)需要更长超时,300s
        location /api/v1/ai/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_redirect http:// https://;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE: 禁用缓冲,支持流式推送;长超时 300s
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── P1 安全加固: 上传路由(放宽 body 限制) → api 后端 ──
        # /api/v1/users/import 批量导入用户(CSV/JSON),需要更大 body 限制
        location = /api/v1/users/import {
            limit_req zone=api_general burst=20 nodelay;
            # 上传路由例外:允许 50m
            client_max_body_size 50m;
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_redirect http:// https://;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── API 反代 → api 后端 ──
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            # 修复 FastAPI 尾部斜杠 307 重定向的协议:
            # 后端认为请求是 http,重定向 Location 用 http://,
            # 客户端从 https 跟随到 http 时会剥离 Authorization 头导致 403。
            # 把重定向 URL 中的 http:// 重写为 https://,避免协议降级。
            proxy_redirect http:// https://;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── word-games 反代 → ai-engine ──
        # P0-01: 不再注入 X-Api-Key，浏览器请求必须携带用户 Bearer JWT
        location /word-games/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── chat 对话反代 → ai-engine ──
        # P0-01: 不再注入 X-Api-Key，浏览器请求必须携带用户 Bearer JWT
        # 使用 prefix 匹配 /chat 同时覆盖 /chat 和 /chat/health，
        # 避免 FastAPI 307 尾部斜杠重定向导致前端 POST /chat 404
        location /chat {
            proxy_pass http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── keepalive 保活端点 → api 后端 ──
        # Upstash Cron 定期 ping 此路径,同时保活 HF Space + Aiven PG + Upstash Redis
        location /keepalive {
            proxy_pass http://127.0.0.1:8000/keepalive;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        # ── health 健康检查 → api 后端 ──
        # /health(存活) 与 /health/ready(就绪) 均透传到后端
        location /health {
            proxy_pass http://127.0.0.1:8000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }

        location /health/ready {
            proxy_pass http://127.0.0.1:8000/health/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }
    }
}
