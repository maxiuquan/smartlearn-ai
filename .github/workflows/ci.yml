name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # Python 编译检查 + pytest
  # ─────────────────────────────────────────────
  python-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install API dependencies
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Install AI Engine dependencies
        working-directory: services/ai-engine
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: py_compile all Python files
        run: |
          find services/ -name "*.py" -not -path "*/__pycache__/*" | while read f; do
            python -m py_compile "$f" || { echo "COMPILE FAILED: $f"; exit 1; }
          done
          echo "All Python files compiled successfully"

      - name: JSON syntax validation
        run: |
          find data/ -name "*.json" | while read f; do
            python -c "import json; json.load(open('$f', encoding='utf-8'))" || { echo "JSON PARSE FAILED: $f"; exit 1; }
          done
          echo "All JSON files validated successfully"

      - name: Run API tests
        working-directory: services/api
        env:
          ENVIRONMENT: testing
          JWT_SECRET: "ci-test-secret-key-at-least-32-characters-long-xxxxx"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379/0"
          AI_ENGINE_AUTH_ENABLED: "false"
        run: |
          python -m pytest tests/ -v --tb=short || true

      - name: Run AI Engine tests
        working-directory: services/ai-engine
        env:
          AI_ENGINE_AUTH_ENABLED: "false"
          JWT_SECRET: "ci-test-secret-key-at-least-32-characters-long-xxxxx"
        run: |
          python -m pytest tests/ -v --tb=short || true

  # ─────────────────────────────────────────────
  # TypeScript 类型检查（admin）
  # ─────────────────────────────────────────────
  admin-tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install admin dependencies
        working-directory: apps/admin
        run: |
          if [ -f package.json ]; then
            npm install || true
          fi

      - name: TypeScript type check
        working-directory: apps/admin
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || true
          fi
